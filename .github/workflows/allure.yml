name: Run Cypress Tests and Generate Allure Report

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

# Fixes the GitHub deprecation warning by forcing Node 24 execution
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cypress_and_report:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout your code inside the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Uses a modern Node LTS for your project code
          cache: 'npm'

      # 3. Install npm dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Run Cypress tests
      - name: Run Cypress tests
        run: npm run test:cypress
        continue-on-error: true

      # 5. Get Allure history (FIXED: added continue-on-error so it won't crash on the first run)
      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true 
        with:
          ref: gh-pages
          path: gh-pages-dir

      # 6. Generate the Allure Report
      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      # 7. Publish the report to GitHub Pages
      - name: Deploy Allure Report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
